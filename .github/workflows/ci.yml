name: Civic Issue CI

on:
  push:
    branches:
      - main

jobs:
  frontend-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: civic-governance-fixed-frontend/fixed-frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install
      - run: npm run build

  backend-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: civic-governance-fixed-backend/civic-governance

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - run: mvn clean package