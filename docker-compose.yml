services:
  # MySQL Database
  mysql-db:
    image: mysql:8.0
    container_name: civic-mysql-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: civic_system
      TZ: UTC
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - civic-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 20s
      retries: 10

  # Spring Boot Backend
  backend:
    build:
      context: "./civic-governance-fixed Backend/civic-governance"
      dockerfile: Dockerfile
    container_name: civic-backend
    restart: unless-stopped
    environment:
      DB_URL: jdbc:mysql://mysql-db:3306/civic_system?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_POOL_SIZE: 10
      DB_MIN_IDLE: 5

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}

      SERVER_PORT: 8080
      LOG_LEVEL: INFO

      JPA_DDL_AUTO: update
      JPA_SHOW_SQL: false

      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    ports:
      - "8080:8080"
    depends_on:
      mysql-db:
        condition: service_healthy
    networks:
      - civic-network
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # React Frontend (Vite)
  frontend:
    image: node:18-alpine
    container_name: civic-frontend
    working_dir: /app
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    volumes:
      - "./civic-governance-fixed Frontend/fixed-frontend:/app"
    command: sh -c "npm install && npx vite --host 0.0.0.0"
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - civic-network

volumes:
  mysql_data:

networks:
  civic-network:
    driver: bridge